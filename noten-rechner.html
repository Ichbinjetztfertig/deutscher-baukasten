<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noten-Rechner - Deutscher Baukasten</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">Deutscher <span>Baukasten</span></div>
  </header>
  <div class="wrapper">
    <div class="card">
      <h1>Noten-Rechner</h1>
      <form id="grade-form">
        <div class="form-group">
          <label for="points-earned">Erreichte Punkte</label>
          <input type="number" id="points-earned" step="0.01" required>
        </div>
        <div class="form-group">
          <label for="points-max">Maximal Punkte</label>
          <input type="number" id="points-max" step="0.01" required>
        </div>
        <button type="button" id="grade-calc">Berechnen</button>
      </form>
      <p id="grade-result"></p>
      <a class="back-button" href="index.html">← Zurück zur Übersicht</a>
    </div>
  </div>
  <footer>
    © 2026 Deutscher Baukasten
  </footer>
  <script>
    document.getElementById('grade-calc').addEventListener('click', function() {
      const earned = parseFloat(document.getElementById('points-earned').value);
      const max = parseFloat(document.getElementById('points-max').value);
      if (earned >= 0 && max > 0) {
        const percent = (earned / max) * 100;
        document.getElementById('grade-result').textContent = 'Prozent: ' + percent.toFixed(2) + '%';
      } else {
        document.getElementById('grade-result').textContent = 'Bitte gültige Werte eingeben.';
      }
    });
  </script>
</body>
</html>
