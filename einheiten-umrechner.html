<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einheiten-Umrechner - Deutscher Baukasten</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="logo">Deutscher <span>Baukasten</span></div>
  </header>
  <div class="wrapper">
    <div class="card">
      <h1>Einheiten-Umrechner</h1>
      <form id="convert-form">
        <div class="form-group">
          <label for="convert-value">Wert</label>
          <input type="number" id="convert-value" step="0.0001" required>
        </div>
        <div class="form-group">
          <label for="convert-type">Umwandlung</label>
          <select id="convert-type">
            <option value="km-m">Kilometer → Meter</option>
            <option value="m-km">Meter → Kilometer</option>
            <option value="kg-g">Kilogramm → Gramm</option>
            <option value="g-kg">Gramm → Kilogramm</option>
          </select>
        </div>
        <button type="button" id="convert-calc">Berechnen</button>
      </form>
      <p id="convert-result"></p>
      <a class="back-button" href="index.html">← Zurück zur Übersicht</a>
    </div>
  </div>
  <footer>
    © 2026 Deutscher Baukasten
  </footer>
  <script>
    document.getElementById('convert-calc').addEventListener('click', function() {
      const value = parseFloat(document.getElementById('convert-value').value);
      const type = document.getElementById('convert-type').value;
      let result = null;
      if (!isNaN(value)) {
        switch(type) {
          case 'km-m':
            result = value * 1000;
            break;
          case 'm-km':
            result = value / 1000;
            break;
          case 'kg-g':
            result = value * 1000;
            break;
          case 'g-kg':
            result = value / 1000;
            break;
        }
        document.getElementById('convert-result').textContent = 'Ergebnis: ' + result;
      } else {
        document.getElementById('convert-result').textContent = 'Bitte einen gültigen Wert eingeben.';
      }
    });
  </script>
</body>
</html>
